#Minecraft server properties
#Optimized for Neuromorphic Parkour Bot Training
#Tue Feb 10 15:16:50 EST 2026

# CRITICAL - Allow bots to fly/move freely during physics calculations
allow-flight=true

# Disable unnecessary features for performance
allow-nether=false
broadcast-console-to-ops=true
broadcast-rcon-to-ops=true

# Easy difficulty (no hostile mobs interfering)
difficulty=easy

# Enable command blocks if you want automated course resets
enable-command-block=true
enable-jmx-monitoring=false
enable-query=false
enable-rcon=false
enable-status=true

# CRITICAL - Disable for bot accounts
enforce-secure-profile=false
enforce-whitelist=false

entity-broadcast-range-percentage=100

# Don't force gamemode changes
force-gamemode=false
function-permission-level=2

# Creative mode recommended for building courses, but bots will handle their own gamemode
gamemode=creative

# Disable structure generation (flat world is better for parkour)
generate-structures=false
generator-settings={}
hardcore=false
hide-online-players=false
initial-disabled-packs=
initial-enabled-packs=vanilla

level-name=world
level-seed=

# RECOMMENDED: Use superflat for parkour training
# Change to minecraft:flat for a flat world
level-type=minecraft\:flat

max-chained-neighbor-updates=1000000

# Increase if you need more than 10 bots
max-players=20

# CRITICAL - Prevent server watchdog from killing ticks during heavy bot calculations
max-tick-time=-1

max-world-size=29999984
motd=Neuromorphic Parkour Training Server

# Reduce compression for faster bot communication
network-compression-threshold=512

# CRITICAL - Must be false for bots
online-mode=false

op-permission-level=4

# Don't kick idle bots
player-idle-timeout=0

prevent-proxy-connections=false

# PVP not needed for training
pvp=false

query.port=25565
rate-limit=0
rcon.password=
rcon.port=25575
require-resource-pack=false
resource-pack=
resource-pack-prompt=
resource-pack-sha1=
server-ip=
server-port=25565

# Reduce simulation distance for better performance
simulation-distance=4

# Disable mob spawning (not needed for parkour)
spawn-animals=false
spawn-monsters=false
spawn-npcs=false

# CRITICAL - Disable spawn protection so bots can interact at 0,0,0
spawn-protection=0

sync-chunk-writes=true
text-filtering-config=
use-native-transport=true

# Reduce view distance for performance
view-distance=6

white-list=false
